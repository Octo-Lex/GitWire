name: Deploy to Production

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - name: Configure git credentials
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global credential.helper store
          echo "https://x-access-token:${GITHUB_TOKEN}@github.com" > ~/.git-credentials
          chmod 600 ~/.git-credentials

      - name: Pull latest code
        run: |
          cd /opt/gitwire
          git fetch origin master
          git reset --hard origin/master

      - name: Clean up disk (if needed)
        run: |
          USED=$(df / | tail -1 | awk '{print $5}' | tr -d '%')
          if [ "$USED" -gt 80 ]; then
            echo "Disk usage at ${USED}%, pruning..."
            docker system prune -af --volumes 2>/dev/null || true
          fi

      - name: Build & Deploy
        run: |
          cd /opt/gitwire
          docker compose build gitwire-app dashboard 2>&1
          docker compose up -d gitwire-app dashboard 2>&1

      - name: Wait for healthy
        run: |
          echo "Waiting for containers to start..."
          for i in $(seq 1 12); do
            APP=$(docker exec gitwire-gitwire-app-1 wget -qO- http://localhost:3000/health 2>/dev/null || echo '')
            DASH_IP=$(docker exec gitwire-dashboard-1 sh -c "ip -4 addr show eth0 | grep -o '[0-9]*\.[0-9]*\.[0-9]*\.[0-9]*' | head -1" 2>/dev/null)
            DASH=$(docker exec gitwire-dashboard-1 wget -qO- "http://${DASH_IP}:3001" 2>/dev/null > /dev/null 2>&1 && echo 'ok' || echo '')
            echo "  Attempt $i/12: app=${APP:+healthy} dash=${DASH:+healthy}"
            if [ -n "$APP" ] && [ -n "$DASH" ]; then
              echo "Both healthy!"
              break
            fi
            sleep 5
          done

      - name: Health check
        run: |
          APP_HEALTH=$(docker exec gitwire-gitwire-app-1 wget -qO- http://localhost:3000/health 2>/dev/null || echo "FAILED")
          DASH_IP=$(docker exec gitwire-dashboard-1 sh -c "ip -4 addr show eth0 | grep -o '[0-9]*\.[0-9]*\.[0-9]*\.[0-9]*' | head -1" 2>/dev/null)
          DASH_HEALTH=$(docker exec gitwire-dashboard-1 wget -qO- "http://${DASH_IP}:3001" 2>/dev/null > /dev/null && echo "OK" || echo "FAILED")
          echo "gitwire-app:   $APP_HEALTH"
          echo "dashboard:     $DASH_HEALTH"
          if echo "$APP_HEALTH" | grep -q "FAILED"; then
            echo "::error::gitwire-app health check failed"
            exit 1
          fi
          if echo "$DASH_HEALTH" | grep -q "FAILED"; then
            echo "::error::dashboard health check failed"
            exit 1
          fi
          echo "All services healthy"
