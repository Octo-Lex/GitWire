name: Deploy to Production

# Triggered when the CI workflow completes on master. The deployment consumes
# the digest-pinned release images that publish-release-images pushed to GHCR,
# verified against the triggering run's release manifest artifact.
#
# Trust boundary: only a SUCCESSFUL, PUSH-triggered, same-repository, master
# CI run may deploy. The condition is checked at every job (the `if:` gate)
# AND re-verified inside deploy-release.sh via explicit workflow metadata.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [master]

permissions:
  actions: read      # download the triggering run's manifest artifact
  contents: read     # checkout/verify the exact release SHA
  packages: read     # pull the digest-pinned GHCR images

# No two production deployments may run concurrently. A new trigger queues
# behind (cancel-in-progress: false) rather than racing the in-flight deploy.
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  # ── Job 1: Security Gate ──────────────────────────────────────
  # No `environment:` — the scan needs no production secrets. Both jobs share
  # the same trust gate and run on the production-bound runner label.
  security:
    name: Security Scan
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'master' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: [self-hosted, gitwire-prod]
    timeout-minutes: 5
    steps:
      - name: Resolve and checkout exact tested SHA
        env:
          DEPLOY_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          cd /opt/gitwire
          git fetch --no-tags origin master
          # The SHA must exist in the repo's history (rejects forged events).
          git cat-file -e "${DEPLOY_SHA}^{commit}"
          git reset --hard "$DEPLOY_SHA"
          # Assert the working tree is exactly the tested commit.
          test "$(git rev-parse HEAD)" = "$DEPLOY_SHA"
          echo "Checked out exact tested SHA: $(git rev-parse --short HEAD)"

      - name: Install gitleaks (if missing)
        run: |
          if ! command -v gitleaks &>/dev/null; then
            echo "Installing gitleaks..."
            curl -sSfL https://raw.githubusercontent.com/gitleaks/gitleaks/master/install.sh | sh -s -- -b /usr/local/bin
          fi

      - name: Secret scan
        run: |
          cd /opt/gitwire
          echo "Scanning repository for leaked secrets..."
          gitleaks git -c .gitleaks.toml --no-banner --verbose \
            --ignore-gitleaks-allow \
            --redact=50 \
            --log-opts="--all" \
            -r /tmp/gitleaks-report.json 2>&1 | tail -20
          exit_code=${PIPESTATUS[0]:-0}
          if [ "$exit_code" -eq 1 ]; then
            echo ""
            echo "DEPLOYMENT BLOCKED -- Secrets detected!"
            echo "   Report: /tmp/gitleaks-report.json"
            echo "   Rotate the exposed secret and remove it from the codebase."
            exit 1
          fi
          echo "No secrets detected (full history + working tree scanned)"

      # Production dependency audit — fail-closed, exception-aware. Generates a
      # fresh report from the exact tested SHA (checked out above) and evaluates
      # it against the version-controlled exception registry. No || true, no
      # continue-on-error, no unconditional success path. The evaluator decides
      # whether all high/critical findings are actively excepted.
      - name: Generate production audit report
        id: audit
        run: |
          cd /opt/gitwire
          set +e
          npm audit --omit=dev --json > /tmp/production-audit.json 2>/tmp/audit-stderr.log
          AUDIT_EXIT=$?
          set -e
          echo "exit=$AUDIT_EXIT" >> "$GITHUB_OUTPUT"
          if [ "$AUDIT_EXIT" -ge 2 ]; then
            echo "::error::npm audit operational error (exit $AUDIT_EXIT)"
            cat /tmp/audit-stderr.log >&2
            exit 1
          fi
          test -s /tmp/production-audit.json || { echo "::error::audit report is empty"; exit 1; }

      - name: Evaluate audit against exception registry
        run: |
          cd /opt/gitwire
          node scripts/enforce-production-audit.mjs \
            /tmp/production-audit.json \
            audit-exceptions.json

  # ── Job 2: Deploy ─────────────────────────────────────────────
  # The ONLY job with `environment: production`. Production-scoped secrets and
  # protection rules apply here. Needs the security scan to pass first.
  deploy:
    name: Deploy Immutable Release
    needs: security
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'master' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: [self-hosted, gitwire-prod]
    environment: production
    timeout-minutes: 15
    steps:
      - name: Resolve and checkout exact tested SHA
        env:
          DEPLOY_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          cd /opt/gitwire
          git fetch --no-tags origin master
          git cat-file -e "${DEPLOY_SHA}^{commit}"
          git reset --hard "$DEPLOY_SHA"
          test "$(git rev-parse HEAD)" = "$DEPLOY_SHA"

      # Download the triggering run's manifest. The input is `run-id` (NOT
      # github.run_id, which is THIS run's id). Cross-run download requires
      # github-token. Extract outside the repository workspace to avoid
      # polluting the working tree.
      - name: Download release manifest
        uses: actions/download-artifact@v4
        with:
          name: production-release-manifest
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ${{ runner.temp }}/production-release

      - name: Verify manifest artifact exists
        run: |
          MANIFEST="${{ runner.temp }}/production-release/release-manifest.json"
          test -f "$MANIFEST"
          echo "Manifest present: $MANIFEST"

      # packages: read grants the token scope, but the Docker client still
      # needs an explicit login. Use the workflow actor (not repository_owner).
      - name: Authenticate to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf '%s' "$GHCR_TOKEN" | \
            docker login ghcr.io \
              --username "${{ github.actor }}" \
              --password-stdin

      - name: Deploy immutable release
        env:
          # Production repository root on CT 115. deploy-release.sh defaults
          # REPO_ROOT to its own parent dir when unset; set it explicitly so
          # the production path is unambiguous.
          REPO_ROOT: /opt/gitwire
          # Explicit workflow trust metadata — passed into deploy-release.sh,
          # which validates them with :? under set -u before dereferencing.
          WORKFLOW_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          WORKFLOW_EVENT: ${{ github.event.workflow_run.event }}
          WORKFLOW_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WORKFLOW_HEAD_REPOSITORY: ${{ github.event.workflow_run.head_repository.full_name }}
          EXPECTED_REPOSITORY: ${{ github.repository }}
          WORKFLOW_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          bash scripts/deploy-release.sh \
            "${{ github.event.workflow_run.head_sha }}" \
            "${{ runner.temp }}/production-release/release-manifest.json" \
            "/opt/gitwire/config/production.env"

      - name: GHCR logout
        if: always()
        run: docker logout ghcr.io || true
