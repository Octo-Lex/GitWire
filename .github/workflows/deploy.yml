name: Deploy to Production

on:
  push:
    branches: [master]

# Least-privilege: only read repo contents by default
# Jobs that need more access must declare it explicitly
permissions:
  contents: read

jobs:
  # ── Job 1: Security Gate ──────────────────────────────────────
  security:
    name: Security Scan
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - name: Pull latest code
        run: |
          cd /opt/gitwire
          git fetch origin master
          git reset --hard origin/master

      - name: Install gitleaks (if missing)
        run: |
          if ! command -v gitleaks &>/dev/null; then
            echo "Installing gitleaks..."
            curl -sSfL https://raw.githubusercontent.com/gitleaks/gitleaks/master/install.sh | sh -s -- -b /usr/local/bin
          fi

      - name: Secret scan
        run: |
          cd /opt/gitwire
          echo "Scanning repository for leaked secrets..."
          gitleaks git -c .gitleaks.toml --no-banner --verbose \
            --ignore-gitleaks-allow \
            --redact=50 \
            --log-opts="--all" \
            -r /tmp/gitleaks-report.json 2>&1 | tail -20
          exit_code=${PIPESTATUS[0]:-0}
          if [ "$exit_code" -eq 1 ]; then
            echo ""
            echo "DEPLOYMENT BLOCKED -- Secrets detected!"
            echo "   Report: /tmp/gitleaks-report.json"
            echo "   Rotate the exposed secret and remove it from the codebase."
            exit 1
          fi
          echo "No secrets detected (full history + working tree scanned)"

      - name: Dependency audit
        run: |
          cd /opt/gitwire
          npm audit --omit=dev --audit-level=high 2>&1 | tail -10 || true

  # ── Job 2: Deploy ─────────────────────────────────────────────
  deploy:
    name: Build & Deploy
    needs: security
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - name: Configure git credentials
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global credential.helper store
          echo "https://x-access-token:${GITHUB_TOKEN}@github.com" > ~/.git-credentials
          chmod 600 ~/.git-credentials

      - name: Pull latest code
        run: |
          cd /opt/gitwire
          git fetch origin master
          git reset --hard origin/master

      - name: Capture deploy context
        id: ctx
        run: |
          cd /opt/gitwire
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "actor=${{ github.actor }}" >> $GITHUB_OUTPUT
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Clean up disk (if needed)
        run: |
          USED=$(df / | tail -1 | awk '{print $5}' | tr -d '%')
          if [ "$USED" -gt 70 ]; then
            echo "Disk usage at ${USED}%, pruning..."
            docker system prune -af --volumes 2>/dev/null || true
          fi

      - name: Build & Deploy
        run: |
          cd /opt/gitwire
          docker compose build gitwire-app dashboard 2>&1
          docker compose up -d gitwire-app dashboard 2>&1

      - name: Wait for healthy
        run: |
          echo "Waiting for containers to start..."
          for i in $(seq 1 12); do
            APP=$(docker exec gitwire-gitwire-app-1 wget -qO- http://localhost:3000/health 2>/dev/null || echo '')
            DASH=$(docker exec gitwire-dashboard-1 wget -qO- "http://0.0.0.0:3001/dashboard" 2>/dev/null > /dev/null 2>&1 && echo 'ok' || echo '')
            echo "  Attempt $i/12: app=${APP:+healthy} dash=${DASH:+healthy}"
            if [ -n "$APP" ] && [ -n "$DASH" ]; then
              echo "Both healthy!"
              break
            fi
            sleep 5
          done

      - name: Health check + Deploy summary
        if: always()
        run: |
          # ── Health checks ───────────────────────────────────────
          APP_HEALTH=$(docker exec gitwire-gitwire-app-1 wget -qO- http://localhost:3000/health 2>/dev/null || echo "FAILED")
          DASH_HEALTH=$(docker exec gitwire-dashboard-1 wget -qO- "http://0.0.0.0:3001/dashboard" 2>/dev/null > /dev/null && echo "OK" || echo "FAILED")

          echo "gitwire-app:   $APP_HEALTH"
          echo "dashboard:     $DASH_HEALTH"

          # ── Capture image IDs ───────────────────────────────────
          APP_IMAGE=$(docker images gitwire-gitwire-app --format '{{.ID}}' | head -1)
          DASH_IMAGE=$(docker images gitwire-dashboard --format '{{.ID}}' | head -1)

          # ── Capture container status ────────────────────────────
          CONTAINER_STATUS=$(docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' | grep -E 'gitwire|NAMES')

          # ── Write GitHub step summary ───────────────────────────
          echo "## GitWire Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ steps.ctx.outputs.sha_short }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Actor | \`${{ steps.ctx.outputs.actor }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Deployed at | \`${{ steps.ctx.outputs.timestamp }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| App image | \`${APP_IMAGE:-unknown}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Dashboard image | \`${DASH_IMAGE:-unknown}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| API health | \`$(echo $APP_HEALTH | grep -q ok && echo 'OK' || echo 'FAILED')\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Dashboard health | \`$(echo $DASH_HEALTH | grep -q OK && echo 'OK' || echo 'FAILED')\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Containers" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$CONTAINER_STATUS" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          # ── Final gate ──────────────────────────────────────────
          if echo "$APP_HEALTH" | grep -q "FAILED"; then
            echo "::error::gitwire-app health check failed"
            echo "--- Last 20 lines of app logs ---"
            docker logs --tail 20 gitwire-gitwire-app-1 2>&1 || true
            exit 1
          fi
          if echo "$DASH_HEALTH" | grep -q "FAILED"; then
            echo "::error::dashboard health check failed"
            echo "--- Last 20 lines of dashboard logs ---"
            docker logs --tail 20 gitwire-dashboard-1 2>&1 || true
            exit 1
          fi

          echo "All services healthy"
