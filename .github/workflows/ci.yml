name: CI

on:
  workflow_dispatch:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Verify lockfile consistency
        run: |
          if [ "$(node -p "require('./package.json').version")" != "$(node -p "require('./package-lock.json').version")" ]; then
            echo "::error::package.json and package-lock.json versions do not match"
            exit 1
          fi
      - name: Verify core VERSION constant
        run: |
          CORE_VER=$(node -e "const fs=require('fs');const s=fs.readFileSync('packages/core/src/index.js','utf-8');const m=s.match(/VERSION\s*=\s*\"([^\"]+)\"/);console.log(m?m[1]:'')")
          PKG_VER=$(node -p "require('./package.json').version")
          echo "core: $CORE_VER, package: $PKG_VER"
          if [ "$CORE_VER" != "$PKG_VER" ]; then
            echo "::error::core VERSION ($CORE_VER) != package.json ($PKG_VER)"
            exit 1
          fi
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Syntax check all source files
        run: |
          find packages/web/src packages/core/src packages/rules/src packages/runtime/src \
            -name '*.js' -not -path '*/node_modules/*' \
            -exec node --check {} \;

  rules-tests:
    runs-on: ubuntu-latest
    needs: syntax-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - name: Run rules tests
        run: cd packages/rules && NODE_OPTIONS='--experimental-vm-modules' npx jest --passWithNoTests --forceExit
        env:
          NODE_ENV: test

  web-tests:
    runs-on: ubuntu-latest
    needs: syntax-check
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --ignore-scripts
      - name: Run web unit tests
        run: cd packages/web && NODE_OPTIONS='--experimental-vm-modules' npx jest --testPathPatterns='tests/unit' --passWithNoTests --forceExit
        env:
          NODE_ENV: test
