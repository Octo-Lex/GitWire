# GitWire Production Deployment
# ─────────────────────────────────────────────────────────────────────────────
#
# Services:
#   1. gitwire-app    — Express API + workers
#   2. postgres       — PostgreSQL 16 database
#   3. redis          — Redis 7 queue backend
#   4. tunnel         — Cloudflare Tunnel (outbound only, no NAT issues)
#
# Prerequisites:
#   1. Create a Cloudflare Tunnel:
#      cloudflared tunnel create gitwire
#      → note the tunnel ID from the output
#
#   2. Configure DNS:
#      cloudflared tunnel route dns gitwire gitwire.yourdomain.com
#
#   3. Copy this .env from .env.example and fill in all values
#
# Usage:
#   docker compose up -d
#   docker compose logs -f gitwire-app
#
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── GitWire Application ──────────────────────────────────────────────────
  gitwire-app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      # Override DB/Redis URLs for Docker networking
      DATABASE_URL: postgresql://gitwire:${DB_PASSWORD:-changeme}@postgres:5432/gitops_hub
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gitwire-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: gitwire
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: gitops_hub
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    networks:
      - gitwire-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitwire -d gitops_hub"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - gitwire-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Cloudflare Tunnel ────────────────────────────────────────────────────
  # Creates an outbound tunnel to Cloudflare — no inbound ports needed.
  # Your domain (e.g. gitwire.yourdomain.com) points through Cloudflare
  # directly to this container on port 3000.
  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    env_file: .env
    environment:
      # Set TUNNEL_TOKEN in .env (from Cloudflare dashboard)
      # Get it from: https://one.dash.cloudflare.com → Networks → Tunnels → gitwire → Install
      # Or from: cloudflared tunnel token gitwire
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      gitwire-app:
        condition: service_healthy
    networks:
      - gitwire-net

networks:
  gitwire-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
