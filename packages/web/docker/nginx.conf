# docker/nginx.conf
# Nginx reverse proxy config for production VPS.
# Place at: /etc/nginx/sites-available/gitops-hub
# Enable: ln -s /etc/nginx/sites-available/gitops-hub /etc/nginx/sites-enabled/
# SSL:    certbot --nginx -d your-domain.com

server {
    listen 80;
    server_name your-domain.com;
    # Redirect all HTTP to HTTPS (uncomment after certbot runs)
    # return 301 https://$host$request_uri;

    # ── Webhook endpoint ─────────────────────────────────────────────────────
    location /webhooks/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # GitHub webhooks time out at 10s — give node plenty of room
        proxy_read_timeout 30s;

        # Pass the raw body without buffering (important for signature verification)
        proxy_request_buffering off;
    }

    # ── API ──────────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Health check ─────────────────────────────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:3000;
    }

    # ── Next.js frontend (port 3001) ─────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host       $host;
        proxy_cache_bypass $http_upgrade;
    }
}

# HTTPS block — certbot will fill this in automatically
