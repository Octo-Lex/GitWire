services:
  gitwire-app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: packages/web/.env
    environment:
      DATABASE_URL: postgresql://gitwire:${DB_PASSWORD:?DB_PASSWORD must be set}@postgres:5432/gitops_hub
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      PORT: 3000
    volumes:
      - ./secrets/gitwire-hq.pem:/app/packages/web/gitwire-hq.2026-05-15.private-key.pem:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gitwire-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: gitwire
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      POSTGRES_DB: gitops_hub
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/web/db/migrations:/docker-entrypoint-initdb.d
    networks:
      - gitwire-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitwire -d gitops_hub"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - gitwire-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  bot:
    build:
      context: packages/bot
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      GITWIRE_API_URL: http://gitwire-app:3000
      REDIS_URL: redis://redis:6379
      PORT: "3002"
    depends_on:
      gitwire-app:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gitwire-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://0.0.0.0:3002/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  landing:
    build:
      context: landing
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - gitwire-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://0.0.0.0:80/"]
      interval: 30s
      timeout: 5s
      retries: 3

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      gitwire-app:
        condition: service_healthy
    networks:
      - gitwire-net

  dashboard:
    build:
      context: packages/web-dashboard
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://gitwire-app:3000}
      HOSTNAME: "0.0.0.0"
      PORT: 3001
    depends_on:
      gitwire-app:
        condition: service_healthy
    networks:
      - gitwire-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://0.0.0.0:3001/dashboard"]
      interval: 30s
      timeout: 5s
      retries: 3

  docs:
    build:
      context: docs
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - gitwire-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://0.0.0.0:80/"]
      interval: 30s
      timeout: 5s
      retries: 3

  demo:
    build:
      context: packages/demo-dashboard
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - gitwire-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://0.0.0.0:80/"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  gitwire-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
