# =============================================================================
# docker-compose.yml — PRODUCTION BASE (build-free, immutable images)
# =============================================================================
# Every application service references an image via a mandatory ${VAR:?}
# variable. The variable MUST be set in the environment or an --env-file,
# or Compose refuses to interpolate (fail-closed).
#
#   Production deployment:  see scripts/deploy-release.sh + the wrapper
#     compose_release() / compose_current() documented in
#     docs/installation/deployment-runbook.md ("Immutable (pull-based)
#     Deployment"). Production uses TWO env files:
#       /opt/gitwire/config/production.env      — stable (secrets, secondary
#                                                   image refs, validator identity)
#       /opt/gitwire/releases/<sha>/images.env  — per-release (3 release refs)
#     Deployment uses a STAGED release env (from the validated manifest); the
#     releases/current symlink advances only after all gates pass.
#
#   Local development:       docker-compose.build.yml carries the build:
#     definitions. A project-root .env (from .env.example) provides the
#     placeholder values that satisfy these ${VAR:?} guards:
#       docker compose -f docker-compose.yml -f docker-compose.build.yml up -d
#
# CI build jobs (ci.yml docker-build-*) use direct `docker build` and do NOT
# depend on this file. Removing build: here does not affect CI.

services:
  gitwire-app:
    image: ${GITWIRE_APP_IMAGE:?GITWIRE_APP_IMAGE is required}
    restart: unless-stopped
    env_file: packages/web/.env
    environment:
      DATABASE_URL: postgresql://gitwire:${DB_PASSWORD:?DB_PASSWORD must be set}@postgres:5432/gitops_hub
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      PORT: 3000
      # v0.23.0 — executor-service backend (app never touches Docker authority)
      GITWIRE_EXECUTOR_BACKEND: ${GITWIRE_EXECUTOR_BACKEND:-executor-service}
      GITWIRE_EXECUTOR_SERVICE_URL: http://gitwire-executor-service:3003
      GITWIRE_EXECUTOR_SERVICE_TOKEN: ${GITWIRE_EXECUTOR_SERVICE_TOKEN:?GITWIRE_EXECUTOR_SERVICE_TOKEN must be set}
      # Validator image identity is MANDATORY in production. The validator
      # image is an independently published, immutable production dependency.
      # An empty value is a deployment preflight failure, not a default.
      GITWIRE_VALIDATOR_IMAGE_REF: ${GITWIRE_VALIDATOR_IMAGE_REF:?GITWIRE_VALIDATOR_IMAGE_REF must be set}
      GITWIRE_VALIDATOR_IMAGE_DIGEST: ${GITWIRE_VALIDATOR_IMAGE_DIGEST:?GITWIRE_VALIDATOR_IMAGE_DIGEST must be set}
    volumes:
      - ./secrets/gitwire-hq.pem:/app/packages/web/gitwire-hq.private-key.pem:ro
      # NOTE: NO /var/run/docker.sock mount here. The app container has zero
      # Docker authority. The executor-service container owns the socket.
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gitwire-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Executor Service (v0.23.0) ────────────────────────────────────────────
  # Owns container-runtime authority for validator execution. The CT-local
  # Docker socket is mounted HERE ONLY — never into gitwire-app. The service
  # exposes a narrow private API (GET /health + POST /v1/validate) on the
  # gitwire-net network; it is NOT published to the host.
  gitwire-executor-service:
    image: ${GITWIRE_EXECUTOR_IMAGE:?GITWIRE_EXECUTOR_IMAGE is required}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3003
      EXECUTOR_DEPLOYMENT_MODE: compose-local
      EXECUTOR_WORKSPACE_TMP: /workspace-tmp
      GITWIRE_EXECUTOR_SERVICE_TOKEN: ${GITWIRE_EXECUTOR_SERVICE_TOKEN:?GITWIRE_EXECUTOR_SERVICE_TOKEN must be set}
      # Validator identity is MANDATORY. /health.ready is true ONLY when the
      # runtime is reachable AND both ref+digest are set. Deployment hard-gates
      # on ready=true; an unset value here makes that gate fail closed.
      GITWIRE_VALIDATOR_IMAGE_REF: ${GITWIRE_VALIDATOR_IMAGE_REF:?GITWIRE_VALIDATOR_IMAGE_REF must be set}
      GITWIRE_VALIDATOR_IMAGE_DIGEST: ${GITWIRE_VALIDATOR_IMAGE_DIGEST:?GITWIRE_VALIDATOR_IMAGE_DIGEST must be set}
    volumes:
      # CT-local Docker socket mounted into the EXECUTOR SERVICE ONLY.
      # NOT mounted into gitwire-app. See docs/architecture/v0.23-executor-service.md
      # "Runtime endpoint (v0.23.0 default)".
      - /var/run/docker.sock:/var/run/docker.sock
      # Host-shared workspace tempdir (bind mount, not named volume). The
      # executor-service creates validator workspaces here; the nested Docker
      # daemon mounts them as --volume=<path>:/workspace. A named volume would
      # not be accessible to the nested Docker daemon at the same path.
      # Docker-in-LXC requires the path to be visible on the host filesystem.
      #
      # OPERATOR: this host path MUST be prepared before docker compose up:
      #   sudo mkdir -p /workspace-tmp
      #   sudo chown 1000:1000 /workspace-tmp
      #   sudo chmod 1777 /workspace-tmp
      # The executor-service runs as uid 1000 and creates tempdirs here; if
      # the host path is root-owned, mkdtemp fails with EACCES.
      - /workspace-tmp:/workspace-tmp
    # P2 fix: the executor image runs as non-root uid 1000 (node user). The
    # Docker socket is typically root:docker (gid ~998) with 0660 permissions.
    # Without group_add, docker info fails with permission denied. The operator
    # must export DOCKER_SOCKET_GID before docker compose up (runbook documents
    # this). The default (998) matches most Debian/Ubuntu systems.
    group_add:
      - "${DOCKER_SOCKET_GID:-998}"
    networks:
      - gitwire-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: gitwire
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set}
      POSTGRES_DB: gitops_hub
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/web/db/migrations:/docker-entrypoint-initdb.d
    networks:
      - gitwire-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitwire -d gitops_hub"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Durable memory ceiling + eviction policy via command-line args so they
    # survive container recreation (CONFIG SET is process-memory only when
    # Redis runs without a config file). noeviction is correct for BullMQ:
    # evicting queue keys with allkeys-lru would silently drop active/delayed
    # jobs. Write failures under noeviction are loud and recoverable.
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - noeviction
    volumes:
      - redis_data:/data
    networks:
      - gitwire-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  bot:
    image: ${GITWIRE_BOT_IMAGE:?GITWIRE_BOT_IMAGE is required}
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      GITWIRE_API_URL: http://gitwire-app:3000
      REDIS_URL: redis://redis:6379
      PORT: "3002"
    depends_on:
      gitwire-app:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gitwire-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://0.0.0.0:3002/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  landing:
    image: ${GITWIRE_LANDING_IMAGE:?GITWIRE_LANDING_IMAGE is required}
    restart: unless-stopped
    networks:
      - gitwire-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://0.0.0.0:80/"]
      interval: 30s
      timeout: 5s
      retries: 3

  tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      gitwire-app:
        condition: service_healthy
    networks:
      - gitwire-net

  dashboard:
    image: ${GITWIRE_DASHBOARD_IMAGE:?GITWIRE_DASHBOARD_IMAGE is required}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://gitwire-app:3000}
      HOSTNAME: "0.0.0.0"
      PORT: 3001
    depends_on:
      gitwire-app:
        condition: service_healthy
    networks:
      - gitwire-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://0.0.0.0:3001/dashboard"]
      interval: 30s
      timeout: 5s
      retries: 3

  docs:
    image: ${GITWIRE_DOCS_IMAGE:?GITWIRE_DOCS_IMAGE is required}
    restart: unless-stopped
    networks:
      - gitwire-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://0.0.0.0:80/"]
      interval: 30s
      timeout: 5s
      retries: 3

  demo:
    image: ${GITWIRE_DEMO_IMAGE:?GITWIRE_DEMO_IMAGE is required}
    restart: unless-stopped
    networks:
      - gitwire-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://0.0.0.0:80/"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  gitwire-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
