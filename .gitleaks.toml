# ── GitWire Secret Scanning Configuration ─────────────────────────
# This config runs on every commit (pre-commit hook) and in CI.
#
# Docs: https://github.com/gitleaks/gitleaks#configuration

title = "GitWire Secret Scanning"

[extend]
useDefault = true

# ── Global allowlist ──────────────────────────────────────────────
# These patterns are ignored across ALL rules.

[allowlist]
  description = "Global allowlist for known-fake fixture strings and non-source assets"
  regexTarget = "match"
  regexes = [
    '''YOUR[_-]KEY''',
    '''YOUR[_-]SECRET''',
    '''YOUR[_-]TOKEN''',
    '''YOUR[_-]PASSWORD''',
    '''YOURDOMAIN''',
    '''yourdomain\.com''',
    '''changeme''',
    '''sk-ant-YOUR''',
    '''password@localhost''',
    '''-----BEGIN RSA PRIVATE KEY-----\\nMIIEow\.\.\.''',
    '''gw_sec_live_''',
  ]
  # NOTE: tests/**, helpers/**, *.test.*, and *.spec.* were previously
  # excluded here. Removed because test code is a common place for real
  # credentials to be accidentally committed. Only specific fixture
  # paths with known-fake values should be allowlisted.
  paths = [
    '''docs/.*''',
    '''README\.md''',
    '''DEVELOPMENT\.md''',
    '''CONTRIBUTING\.md''',
    '''.vitepress/.*''',
    '''GitWireApp.*\.jsx''',
    '''app\.jsx''',
    '''index2\.html''',
    '''index\.html''',
    '''MediaPackage.*''',
    # scripts/secret-leak-stress-test.sh contains deliberately fake private
    # keys, tokens, and other high-entropy strings used to verify gitleaks
    # detection. These are NOT real credentials.
    '''scripts/secret-leak-stress-test\.sh''',
  ]
